<!-- Dentro da <div class="main">, antes do fechamento -->
<div class="card">
  <h3>📷 Consultar por Foto</h3>
  <input type="file" id="fotoInput" accept="image/*">
  <button onclick="analisarFoto()">Analisar</button>
  <p id="respostaFoto"></p>
</div>

<script>
// ----------------- CONSULTA POR FOTO -----------------
// SIMULAÇÃO DE RECONHECIMENTO DE IMAGEM
const itensReconhecidos = {
  // Medicamentos
  "losartana": "Losartana → Pressão alta, dose: 50mg/dia",
  "metformina": "Metformina → Diabetes tipo 2, dose: 500mg/dia",
  "ibuprofeno": "Ibuprofeno → Dor, anti-inflamatório",
  "dipirona": "Dipirona → Dor e febre",
  // Alimentos
  "banana": "Banana → 89 kcal por 100g, carboidratos: 23g, potássio: 358mg",
  "maçã": "Maçã → 52 kcal por 100g, carboidratos: 14g, fibras: 2,4g",
  "couve": "Couve → 49 kcal por 100g, fibras: 3,6g, vitamina C: 120mg",
  "arroz": "Arroz integral → 111 kcal por 100g, carboidratos: 23g, fibras: 1,8g",
  "feijão": "Feijão → 347 kcal por 100g, proteínas: 21g, fibras: 16g",
  // Exercícios
  "caminhada": "Caminhada leve → 30 minutos, baixa intensidade, ideal para idosos",
  "alongamento": "Alongamento → 10 minutos, ajuda na flexibilidade e circulação"
};

function analisarFoto() {
  const file = document.getElementById("fotoInput").files[0];
  if (!file) { 
    alert("Selecione uma foto!"); 
    return; 
  }

  // Simulação: identifica o item pelo nome do arquivo (ex: "banana.jpg", "losartana.png")
  const nomeArquivo = file.name.toLowerCase();
  let resultado = "❌ Item não reconhecido";

  Object.keys(itensReconhecidos).forEach(chave => {
    if (nomeArquivo.includes(chave)) {
      resultado = itensReconhecidos[chave];
    }
  });

  document.getElementById("respostaFoto").innerText = resultado;
}
</script>
