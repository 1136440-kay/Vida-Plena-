<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidaPlena+</title>

<style>
body{font-family:Arial;background:#eef2ff;}
.card{background:white;padding:15px;margin:10px;border-radius:10px;}
button{padding:10px;}
.emergency{position:fixed;bottom:20px;right:20px;background:red;color:white;padding:20px;border-radius:50%;}
</style>

</head>
<body>

<div class="card">
<h3>❤️ Batimentos</h3>
<p id="bpm"></p>
</div>

<div class="card">
<h3>🤖 IA</h3>
<p id="ia"></p>
</div>

<div class="card">
<h3>📋 Prontuário</h3>
<input id="nota">
<button onclick="salvar()">Salvar</button>
<ul id="lista"></ul>
</div>

<div class="card">
<h3>🦷 Odontologia</h3>
<input id="dente">
<button onclick="odonto()">Registrar</button>
<ul id="listaOdonto"></ul>
</div>

<button class="emergency" onclick="alert('🚨 Emergência acionada!')">🚨</button>

<script>
setInterval(()=>{
let bpm=Math.floor(Math.random()*40)+60;
document.getElementById("bpm").innerText=bpm+" bpm";
document.getElementById("ia").innerText=bpm>100?"🚨 Risco":"Normal";
},2000);

function salvar(){
let dados=JSON.parse(localStorage.getItem("prontuario"))||[];
dados.push(document.getElementById("nota").value);
localStorage.setItem("prontuario",JSON.stringify(dados));
mostrar();
}

function mostrar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let dados=JSON.parse(localStorage.getItem("prontuario"))||[];
dados.forEach(item=>{
let li=document.createElement("li");
li.innerText=item;
lista.appendChild(li);
});
}

function odonto(){
let texto=document.getElementById("dente").value;
let diag=texto.includes("dor")?"Possível cárie":"Avaliação";
let dados=JSON.parse(localStorage.getItem("odonto"))||[];
dados.push(texto+" → "+diag);
localStorage.setItem("odonto",JSON.stringify(dados));
mostrarOdonto();
}

function mostrarOdonto(){
let lista=document.getElementById("listaOdonto");
lista.innerHTML="";
let dados=JSON.parse(localStorage.getItem("odonto"))||[];
dados.forEach(item=>{
let li=document.createElement("li");
li.innerText=item;
lista.appendChild(li);
});
}

window.onload=function(){
mostrar();
mostrarOdonto();
}
</script>

</body>
</html>
