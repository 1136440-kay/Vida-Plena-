<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidaPlena+ Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#667eea,#764ba2);
color:#333;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#1e1e2f;
color:white;
padding:20px;
height:100vh;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
margin-top:10px;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARDS */
.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* LOGIN */
#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

input{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#667eea;
color:white;
}

.emergency{
position:fixed;
bottom:20px;
right:20px;
background:red;
padding:20px;
border-radius:50%;
color:white;
font-size:20px;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>🔐 VidaPlena+ Premium</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="cadastro()">Cadastrar</button>
<p id="msg"></p>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>VidaPlena+</h2>
<p id="userInfo"></p>

<button onclick="logout()">🚪 Sair</button>
<button onclick="limparDados()">🗑️ Reset</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h3>❤️ Monitoramento</h3>
<p id="bpm"></p>
<p id="ia"></p>
</div>

<div class="card">
<h3>📊 Gráfico de Batimentos</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📋 Prontuário</h3>
<input id="nota">
<button onclick="salvar()">Salvar</button>
<ul id="lista"></ul>
</div>

<div class="card">
<h3>🦷 Odontologia</h3>
<input id="dente">
<button onclick="odonto()">Registrar</button>
<ul id="listaOdonto"></ul>
</div>

</div>

<button class="emergency" onclick="emergencia()">🚨</button>

<script>

// LOGIN
function cadastro(){
let u=user.value,p=pass.value;
if(!u||!p){msg.innerText="Preencha!";return;}
localStorage.setItem("user",u);
localStorage.setItem("pass",p);
msg.innerText="Cadastrado!";
}

function login(){
if(user.value===localStorage.getItem("user") && pass.value===localStorage.getItem("pass")){
loginScreen.style.display="none";
userInfo.innerText="👤 "+user.value;
}else{msg.innerText="Erro";}
}

// LOGOUT
function logout(){loginScreen.style.display="flex";}

// LIMPAR
function limparDados(){localStorage.clear();location.reload();}

// BATIMENTOS + IA
let dadosGrafico=[];
let chart=new Chart(document.getElementById("grafico"),{
type:"line",
data:{
labels:[],
datasets:[{label:"BPM",data:[]}]
}
});

setInterval(()=>{
let bpm=Math.floor(Math.random()*40)+60;
bpmEl=bpm+" bpm";
document.getElementById("bpm").innerText=bpmEl;

let status="Normal";
if(bpm>110)status="🚨 Alto risco";
else if(bpm>90)status="⚠️ Atenção";

document.getElementById("ia").innerText=status;

// atualizar gráfico
chart.data.labels.push("");
chart.data.datasets[0].data.push(bpm);
if(chart.data.labels.length>10){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}
chart.update();

},2000);

// PRONTUÁRIO
function salvar(){
let dados=JSON.parse(localStorage.getItem("p"))||[];
dados.push(new Date().toLocaleString()+" → "+nota.value);
localStorage.setItem("p",JSON.stringify(dados));
mostrar();
}

function mostrar(){
lista.innerHTML="";
(JSON.parse(localStorage.getItem("p"))||[]).forEach(i=>{
let li=document.createElement("li");li.innerText=i;lista.appendChild(li);
});
}

// ODONTO
function odonto(){
let d=dente.value;
let diag=d.includes("dor")?"Cárie":"OK";
let dados=JSON.parse(localStorage.getItem("o"))||[];
dados.push(new Date().toLocaleString()+" → "+d+" → "+diag);
localStorage.setItem("o",JSON.stringify(dados));
mostrarOdonto();
}

function mostrarOdonto(){
listaOdonto.innerHTML="";
(JSON.parse(localStorage.getItem("o"))||[]).forEach(i=>{
let li=document.createElement("li");li.innerText=i;listaOdonto.appendChild(li);
});
}

// EMERGÊNCIA
function emergencia(){
alert("🚨 Emergência enviada!");
}

// LOAD
window.onload=()=>{
mostrar();
mostrarOdonto();
}
</script>

</body>
</html>
