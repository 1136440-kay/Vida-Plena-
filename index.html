<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidaPlena+</title>

<style>
body{font-family:Arial;background:#eef2ff;margin:0;}
.card{background:white;padding:15px;margin:10px;border-radius:10px;}
button{padding:10px;margin-top:5px;}
.emergency{position:fixed;bottom:20px;right:20px;background:red;color:white;padding:20px;border-radius:50%;}
#loginScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#eef2ff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
input{padding:10px;margin:5px;}
#userInfo{padding:10px;font-weight:bold;}
</style>

</head>
<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <h2>🔐 VidaPlena+ Login</h2>
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="cadastro()">Cadastrar</button>
  <p id="msg"></p>
</div>

<!-- 👤 USUÁRIO -->
<div id="userInfo"></div>

<!-- ❤️ BATIMENTOS -->
<div class="card">
<h3>❤️ Batimentos</h3>
<p id="bpm"></p>
</div>

<!-- 🤖 IA -->
<div class="card">
<h3>🤖 IA</h3>
<p id="ia"></p>
</div>

<!-- 📋 PRONTUÁRIO -->
<div class="card">
<h3>📋 Prontuário</h3>
<input id="nota">
<button onclick="salvar()">Salvar</button>
<ul id="lista"></ul>
</div>

<!-- 🦷 ODONTO -->
<div class="card">
<h3>🦷 Odontologia</h3>
<input id="dente">
<button onclick="odonto()">Registrar</button>
<ul id="listaOdonto"></ul>
</div>

<!-- ⚙️ AÇÕES -->
<div class="card">
<button onclick="logout()">🚪 Sair</button>
<button onclick="limparDados()">🗑️ Limpar dados</button>
</div>

<!-- 🚨 EMERGÊNCIA -->
<button class="emergency" onclick="emergencia()">🚨</button>

<script>

// 🔐 CADASTRO
function cadastro(){
let usuario=document.getElementById("user").value;
let senha=document.getElementById("pass").value;

if(!usuario || !senha){
document.getElementById("msg").innerText="Preencha tudo!";
return;
}

localStorage.setItem("user",usuario);
localStorage.setItem("pass",senha);
document.getElementById("msg").innerText="Cadastro realizado!";
}

// 🔐 LOGIN
function login(){
let usuario=document.getElementById("user").value;
let senha=document.getElementById("pass").value;

if(usuario===localStorage.getItem("user") && senha===localStorage.getItem("pass")){
document.getElementById("loginScreen").style.display="none";
mostrarUsuario();
}else{
document.getElementById("msg").innerText="Usuário ou senha incorretos!";
}
}

// 👤 MOSTRAR USUÁRIO
function mostrarUsuario(){
let user=localStorage.getItem("user");
document.getElementById("userInfo").innerText="👤 Usuário: "+user;
}

// 🚪 LOGOUT
function logout(){
document.getElementById("loginScreen").style.display="flex";
}

// ❤️ MONITORAMENTO + IA MELHORADA
setInterval(()=>{
let bpm=Math.floor(Math.random()*40)+60;
document.getElementById("bpm").innerText=bpm+" bpm";

if(bpm > 110){
document.getElementById("ia").innerText="🚨 Alto risco";
}else if(bpm > 90){
document.getElementById("ia").innerText="⚠️ Atenção";
}else{
document.getElementById("ia").innerText="✅ Normal";
}
},2000);

// 📋 PRONTUÁRIO COM DATA
function salvar(){
let dados=JSON.parse(localStorage.getItem("prontuario"))||[];

let texto=document.getElementById("nota").value;
let data=new Date().toLocaleString();

dados.push(data+" → "+texto);

localStorage.setItem("prontuario",JSON.stringify(dados));
mostrar();
}

// MOSTRAR PRONTUÁRIO
function mostrar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let dados=JSON.parse(localStorage.getItem("prontuario"))||[];
dados.forEach(item=>{
let li=document.createElement("li");
li.innerText=item;
lista.appendChild(li);
});
}

// 🦷 ODONTO
function odonto(){
let texto=document.getElementById("dente").value;
let diag=texto.includes("dor")?"Possível cárie":"Avaliação";
let dados=JSON.parse(localStorage.getItem("odonto"))||[];

let data=new Date().toLocaleString();

dados.push(data+" → "+texto+" → "+diag);

localStorage.setItem("odonto",JSON.stringify(dados));
mostrarOdonto();
}

// MOSTRAR ODONTO
function mostrarOdonto(){
let lista=document.getElementById("listaOdonto");
lista.innerHTML="";
let dados=JSON.parse(localStorage.getItem("odonto"))||[];
dados.forEach(item=>{
let li=document.createElement("li");
li.innerText=item;
lista.appendChild(li);
});
}

// 🚨 EMERGÊNCIA COM REGISTRO
function emergencia(){
let dados=JSON.parse(localStorage.getItem("emergencia"))||[];
let data=new Date().toLocaleString();

dados.push("🚨 Emergência acionada em: "+data);
localStorage.setItem("emergencia",JSON.stringify(dados));

alert("🚨 Emergência registrada!");
}

// 🗑️ LIMPAR DADOS
function limparDados(){
localStorage.clear();
alert("Dados apagados!");
location.reload();
}

// 🔄 CARREGAR
window.onload=function(){
mostrar();
mostrarOdonto();
}

</script>

</body>
</html>
